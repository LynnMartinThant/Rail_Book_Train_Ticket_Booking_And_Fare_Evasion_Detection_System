# Load balancer / reverse proxy for RailBook
# Place behind a load balancer or use as single reverse proxy.
# Example: docker run -p 80:80 -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro nginx

events {
    worker_connections 1024;
}

http {
    upstream booking_backend {
        server booking-service:8080;
        # Add more instances for load balancing:
        # server booking-service-2:8080;
        # server booking-service-3:8080;
    }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 1M;

        # Frontend (React)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API → Spring Boot Booking Service
        location /api/ {
            proxy_pass http://booking_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-User-Id $http_x_user_id;
        }
    }
}
