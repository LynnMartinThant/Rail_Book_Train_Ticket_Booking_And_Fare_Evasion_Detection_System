spring:
  application:
    name: booking-service
  datasource:
    # Default: H2 file. Override with DATABASE_URL (Render/Heroku) or SPRING_DATASOURCE_* (e.g. with profile postgres).
    # AUTO_SERVER=TRUE allows another process to connect (e.g. leftover JVM or H2 Console) and avoids "Database may be already in use"
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/bookingdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 16
    database-platform: org.hibernate.dialect.H2Dialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
  # Event stream: Kafka (optional). If bootstrap-servers not set, in-process events are used.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    streams:
      application-id: booking-movement-streams
    consumer:
      group-id: booking-service-pipeline
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
server:
  # PORT is set by Render/Railway etc.; default 8080 for local
  port: ${PORT:8080}
  # Uncomment to bind to all interfaces (helps Android emulator at 10.0.2.2:8080 if connection refused)
  # address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Policy-driven configuration
# Demo: 1 min = after that the trip is considered done, seat is released for others to book
booking:
  movement:
    streams-enabled: ${BOOKING_MOVEMENT_STREAMS_ENABLED:false}
    # Default on: journey coordination + central fare/fraud consume movement events. Set false only for legacy Drools pipeline.
    event-driven-pipeline-enabled: ${BOOKING_MOVEMENT_EVENT_DRIVEN_PIPELINE_ENABLED:true}
    snapshot-interval-events: ${BOOKING_MOVEMENT_SNAPSHOT_INTERVAL_EVENTS:100}
    stale-threshold-seconds: ${BOOKING_MOVEMENT_STALE_THRESHOLD_SECONDS:300}
  policy:
    reservation-timeout-minutes: 1   # demo; use 5–15 for production (seat released after this if not paid)
    reservation-expiry-check-ms: 60000  # scheduled job marks expired reservations as EXPIRED (every 1 min)
    max-seats-per-booking: 40
    allowed-reservation-statuses-for-payment: RESERVED
    allowed-payment-statuses-for-confirm: PAID
  # Set to true to wipe DB and re-create 20 trains + 40 trips on next startup (then set back to false)
  data:
    reset-on-startup: true
  admin:
    # Simple shared secret for admin API (change in real use)
    secret: admin123
  # Refund: user can request refund within this many minutes after payment
  refund:
    request-window-minutes: 3
  # Hallam Line (Leeds → Sheffield) station order for ticket coverage
  route:
    station-order:
      - Leeds
      - Woodlesford
      - Castleford
      - Normanton
      - Wakefield Kirkgate
      - Darton
      - Barnsley
      - Wombwell
      - Elsecar
      - Chapeltown
      - Meadowhall Interchange
      - Sheffield
  # UK-style fare rule tuning (see FarePolicyRulesService; explanations in segment ukFareRules JSON)
  fare:
    timezone: Europe/London
    weekday-afternoon-offpeak-discount-percent: 15   # Mon–Fri 13:00–17:00 local
    weekend-discount-percent: 15
    peak-surcharge-percent: 15
    weekday-offpeak-start-hour: 13
    weekday-offpeak-end-hour: 17
    peak-morning-start-hour: 7
    peak-morning-end-hour: 10
    peak-evening-start-hour: 16
    peak-evening-end-hour: 19
  # Fare evasion: 1-hour window to resolve (buy/upload ticket) before penalty is applied
  fare-evasion:
    resolution-window-minutes: 1
    default-penalty-amount: 80
    process-interval-ms: 300000  # 5 min: check for overdue PENDING_RESOLUTION and apply penalty
  # Geofence: polygon boundaries, platform segmentation, GPS noise filter, event debouncing, calibration
  geofence:
    gps-min-accuracy-meters: 50      # Reject location updates with worse accuracy (0 = no filter)
    debounce-enter-ms: 15000        # Ignore duplicate ENTERED for same user+geofence within 15s
    calibration-enabled: true       # Allow monthly/ad-hoc calibration (POST /api/admin/geofence-calibration)
  # Fraud Detection Engine: ticket sharing, refund fraud, multi-device, chargeback, suspicious account, consistency
  fraud:
    ticket-sharing-cron: "0 0 * * * *"  # Run every hour; override to disable or change schedule
    cron: "0 30 * * * *"               # Full fraud run (all checks) every hour at :30
    refund-fraud-max-requests-per-user: 5   # Flag user if refund requests in window exceed this
    refund-fraud-window-days: 30            # Refund abuse window (days)
    suspicious-account-min-evasion-count: 3 # Flag user if FARE_EVASION audit count >= this
    suspicious-account-min-pending-resolution: 2  # Flag if PENDING_RESOLUTION segments >= this
  # Journey reconstruction: train matching, confidence scoring, max travel time (Steps 4–9)
  journey:
    reconstruction:
      train-match-window-minutes: 5   # ±5 min to match segment to train schedule
      confidence-threshold: 85       # Legacy / display; enforcement uses auto-penalty threshold below
      confidence-auto-penalty-threshold: 90   # Rule 5: at or above → allow automatic penalty path after resolution window
      confidence-review-threshold: 70         # Borderline band for manual review hints
      max-travel-time-minutes: 120    # Skip segment if exit→enter time > this (e.g. overnight)

# Payment gateway (Stripe: Visa, Apple Pay). Server-side verification via webhooks only.
# Get a test key: https://dashboard.stripe.com/test/apikeys (use "Secret key" sk_test_...)
# Set here, or run: export STRIPE_API_KEY=sk_test_xxx
stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  # If true, "Visa / Apple Pay" works without a real key (simulates success for local testing)
  demo-mode: ${STRIPE_DEMO_MODE:true}

# Ticket: user downloads PDF from Tickets tab (GET /api/reservations/{id}/ticket.pdf).
